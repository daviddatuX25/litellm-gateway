# =============================================================================
# LiteLLM Proxy Configuration
# Central AI Gateway for all dxtechph.online apps
# =============================================================================
# Model definitions: managed via Admin UI / API / MCP tools
# (STORE_MODEL_IN_DB=True enabled — no model_list entries needed here)

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
  drop_params: true
  set_verbose: true
  store_model_in_db: true
  merge_reasoning_content_in_choices: true  # DeepSeek v4 sends reasoning_content separately; merge into content

general_settings:
  store_model_in_db: true
